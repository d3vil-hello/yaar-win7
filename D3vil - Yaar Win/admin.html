<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - YaarWin Game</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f5f6f8;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .login-container {
            background: #fff;
            border-radius: 20px;
            padding: 40px 32px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 4px 30px rgba(0,0,0,0.06);
        }

        .login-icon {
            font-size: 50px;
            margin-bottom: 16px;
        }

        .login-container h1 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .login-container p {
            font-size: 14px;
            color: #888;
            margin-bottom: 24px;
        }

        .login-input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e8eaed;
            border-radius: 12px;
            font-size: 17px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            text-align: center;
            letter-spacing: 4px;
            outline: none;
            transition: 0.2s;
            margin-bottom: 12px;
        }

        .login-input:focus { border-color: #0CD781; }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #0CD781;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .login-btn:hover { background: #0ab86e; }

        .login-error {
            color: #ff4444;
            font-size: 13px;
            margin-top: 10px;
            display: none;
        }

        .login-error.show { display: block; }

        .dashboard {
            display: none;
            max-width: 600px;
            width: 100%;
        }

        .dashboard.active { display: block; }

        .dashboard-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .dashboard-header h1 {
            font-size: 26px;
            font-weight: 800;
        }

        .logout-btn {
            padding: 10px 20px;
            background: #fff;
            color: #ff4444;
            border: 1px solid #ffcccc;
            border-radius: 10px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .logout-btn:hover { background: #fff5f5; }

        .card {
            background: #fff;
            border-radius: 16px;
            padding: 28px 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.04);
        }

        .card-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 18px;
            padding-bottom: 14px;
            border-bottom: 1px solid #f0f0f0;
        }

        .form-group { margin-bottom: 14px; }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #666;
            margin-bottom: 6px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e8eaed;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            outline: none;
            transition: 0.2s;
        }

        .form-input:focus { border-color: #0CD781; }

        .preview-box {
            margin-top: 8px;
            display: flex;
            gap: 10px;
        }

        .preview-btn {
            padding: 10px 20px;
            border-radius: 100px;
            font-weight: 600;
            font-size: 13px;
            pointer-events: none;
        }

        .preview-btn.green {
            background: #0CD781;
            color: #fff;
        }

        .preview-btn.white {
            background: #fff;
            color: #1a1a1a;
            border: 2px solid #e0e0e0;
        }

        .save-btn {
            width: 100%;
            padding: 14px;
            background: #0CD781;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .save-btn:hover { background: #0ab86e; }

        .reset-btn {
            width: 100%;
            padding: 12px;
            background: #fff;
            color: #ff4444;
            border: 1px solid #ffcccc;
            border-radius: 12px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin-top: 8px;
        }

        .reset-btn:hover { background: #fff5f5; }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1a1a1a;
            color: #fff;
            padding: 12px 24px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 500;
            z-index: 999;
            opacity: 0;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .info-box {
            background: #f0fff5;
            border: 1px solid #c8f7d5;
            border-radius: 12px;
            padding: 16px;
            font-size: 13px;
            color: #555;
            margin-top: 12px;
            line-height: 1.6;
        }

        .info-box strong { color: #0CD781; }

        @media (max-width: 480px) {
            .login-container { padding: 28px 18px; }
            .card { padding: 20px 16px; }
        }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div class="login-container" id="loginPage">
        <div class="login-icon">🔒</div>
        <h1>Admin Login</h1>
        <p>Enter password to edit buttons</p>
        <input type="password" class="login-input" id="passwordInput" placeholder="••••" maxlength="10" autocomplete="off">
        <button class="login-btn" onclick="login()">Unlock 🔓</button>
        <p class="login-error" id="loginError">Wrong password! Try again.</p>
    </div>

    <!-- DASHBOARD -->
    <div class="dashboard" id="dashboard">
        <div class="dashboard-header">
            <h1>⚙️ Button Settings</h1>
            <button class="logout-btn" onclick="logout()">🚪 Logout</button>
        </div>

        <!-- Button 1 -->
        <div class="card">
            <div class="card-title">🟢 Button 1 (Green)</div>
            <div class="form-group">
                <label class="form-label">Button Text</label>
                <input type="text" class="form-input" id="inputBtn1Text" placeholder="Register Now" oninput="updatePreview()">
            </div>
            <div class="form-group">
                <label class="form-label">Button Link</label>
                <input type="text" class="form-input" id="inputBtn1Link" placeholder="https://example.com">
            </div>
            <label class="form-label">Preview</label>
            <div class="preview-box">
                <div class="preview-btn green" id="previewBtn1">📝 Register Now</div>
            </div>
        </div>

        <!-- Button 2 -->
        <div class="card">
            <div class="card-title">⚪ Button 2 (Outline)</div>
            <div class="form-group">
                <label class="form-label">Button Text</label>
                <input type="text" class="form-input" id="inputBtn2Text" placeholder="Join Telegram" oninput="updatePreview()">
            </div>
            <div class="form-group">
                <label class="form-label">Button Link</label>
                <input type="text" class="form-input" id="inputBtn2Link" placeholder="https://t.me/...">
            </div>
            <label class="form-label">Preview</label>
            <div class="preview-box">
                <div class="preview-btn white" id="previewBtn2">✈️ Join Telegram</div>
            </div>
        </div>

        <button class="save-btn" onclick="saveSettings()">💾 Save Changes</button>
        <button class="reset-btn" onclick="resetSettings()">🔄 Reset to Default</button>

        <div class="info-box">
            💡 <strong>Save karne ke baad</strong> website page refresh karo ya dubara open karo - buttons automatically update ho jayenge!
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast">✅ Saved!</div>

    <script>
        const ADMIN_PASSWORD = 'admin123';
        const STORAGE_KEY = 'yaarwinButtons';

        const defaults = {
            btn1Text: 'Register Now',
            btn1Link: 'https://example.com/register',
            btn2Text: 'Join Telegram',
            btn2Link: 'https://t.me/yourchannel'
        };

        function login() {
            const password = document.getElementById('passwordInput').value;
            const error = document.getElementById('loginError');

            if (password === ADMIN_PASSWORD) {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('dashboard').classList.add('active');
                document.getElementById('passwordInput').value = '';
                error.classList.remove('show');
                loadSettings();
            } else {
                error.classList.add('show');
                document.getElementById('passwordInput').value = '';
            }
        }

        function logout() {
            document.getElementById('loginPage').style.display = 'block';
            document.getElementById('dashboard').classList.remove('active');
            document.getElementById('loginError').classList.remove('show');
        }

        document.getElementById('passwordInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') login();
        });

        function loadSettings() {
            const data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaults;
            document.getElementById('inputBtn1Text').value = data.btn1Text;
            document.getElementById('inputBtn1Link').value = data.btn1Link;
            document.getElementById('inputBtn2Text').value = data.btn2Text;
            document.getElementById('inputBtn2Link').value = data.btn2Link;
            updatePreview();
        }

        function updatePreview() {
            const btn1Text = document.getElementById('inputBtn1Text').value || 'Button 1';
            const btn2Text = document.getElementById('inputBtn2Text').value || 'Button 2';
            document.getElementById('previewBtn1').textContent = '📝 ' + btn1Text;
            document.getElementById('previewBtn2').textContent = '✈️ ' + btn2Text;
        }

        function saveSettings() {
            const data = {
                btn1Text: document.getElementById('inputBtn1Text').value || defaults.btn1Text,
                btn1Link: document.getElementById('inputBtn1Link').value || defaults.btn1Link,
                btn2Text: document.getElementById('inputBtn2Text').value || defaults.btn2Text,
                btn2Link: document.getElementById('inputBtn2Link').value || defaults.btn2Link
            };

            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            showToast('✅ Saved! Website buttons updated.');
        }

        function resetSettings() {
            if (confirm('Reset to default?')) {
                localStorage.removeItem(STORAGE_KEY);
                loadSettings();
                showToast('🔄 Reset done!');
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
    </script>

</body>
</html>
